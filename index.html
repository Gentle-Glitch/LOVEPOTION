<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nanum+Myeongjo:wght@400;700&display=swap');

    body {
        background: #1a0f0f;
        color: #e0c39a;
        font-family: 'Nanum+Myeongjo', serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .game-container {
        width: 100%;
        max-width: 900px;
        background: #2d1b1b;
        border: 4px double #8b5a2b;
        padding: 30px;
        box-shadow: 0 0 60px rgba(255, 20, 147, 0.4);
    }

    h1 {
        font-family: 'Cinzel', serif;
        text-align: center;
        color: #ff1493;
        text-shadow: 2px 2px 4px #000;
        border-bottom: 2px solid #8b5a2b;
        padding-bottom: 15px;
        letter-spacing: 3px;
    }

    /* 지도 레이아웃 */
    .map-wrapper {
        position: relative;
        width: 100%;
        height: 500px;
        background: radial-gradient(circle, #4a2f2f 0%, #1a0f0f 100%);
        border: 2px solid #8b5a2b;
        margin: 20px 0;
        border-radius: 10px;
        overflow: hidden;
    }

    /* 거점 스타일 */
    .poi {
        position: absolute;
        width: 40px;
        height: 40px;
        background: rgba(255, 20, 147, 0.3);
        border: 2px solid #ff1493;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        transition: 0.3s;
        box-shadow: 0 0 15px #ff1493;
    }

    .poi:hover {
        transform: scale(1.3);
        background: #ff1493;
        z-index: 10;
    }

    /* 던전 위치 (상대적 배치) */
    #dungeon1 { top: 15%; left: 15%; } /* 얼음 동굴 */
    #dungeon2 { top: 15%; right: 15%; } /* 수도원 */
    #dungeon3 { bottom: 25%; left: 20%; } /* 덩굴 숲 */
    #dungeon4 { bottom: 15%; right: 15%; } /* 마왕성 */
    #home { top: 45%; left: 45%; background: #8b5a2b; border-color: #fff; box-shadow: 0 0 15px #fff; } /* 공방 */
    #spa { bottom: 40%; right: 35%; } /* 온천 */
    #buffet { top: 40%; left: 25%; } /* 뷔페 */

    /* 설명 팝업 */
    #desc-panel {
        background: #1e1111;
        border: 1px solid #ff1493;
        padding: 20px;
        min-height: 100px;
        margin-top: 20px;
    }

    .desc-title {
        color: #f1c40f;
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 10px;
        display: block;
        font-family: 'Cinzel', serif;
    }

    .desc-body {
        line-height: 1.6;
        color: #d2b48c;
    }

    .map-legend {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 10px;
        font-size: 0.8em;
    }
</style>
</head>
<body>

<div class="game-container">
    <h1>WORLD MAP: THE POLLUTED LAND</h1>
    
    <div class="map-legend">
        <span>🔴 메인 던전 (재료)</span>
        <span>🟤 거점 & 휴식</span>
    </div>

    <div class="map-wrapper">
        <!-- 메인 던전 -->
        <div class="poi" id="dungeon1" onclick="showDesc('dungeon1')">🧊</div>
        <div class="poi" id="dungeon2" onclick="showDesc('dungeon2')">⛪</div>
        <div class="poi" id="dungeon3" onclick="showDesc('dungeon3')">🌿</div>
        <div class="poi" id="dungeon4" onclick="showDesc('dungeon4')">🔥</div>
        
        <!-- 추가 장소 -->
        <div class="poi" id="home" onclick="showDesc('home')">🏠</div>
        <div class="poi" id="spa" onclick="showDesc('spa')">⛲</div>
        <div class="poi" id="buffet" onclick="showDesc('buffet')">🍷</div>
    </div>

    <div id="desc-panel">
        <span id="desc-title" class="desc-title">장소를 선택하십시오</span>
        <div id="desc-body" class="desc-body">지도의 아이콘을 클릭하면 해당 지역의 상세 정보와 획득 가능한 전리품이 표시됩니다.</div>
    </div>
</div>

<script>
    const data = {
        dungeon1: {
            title: "🧊 냉소의 얼음 동굴",
            body: "보스: 얼음 정령 왕 프로스트. 차가운 냉기가 지배하던 곳이나 지금은 정령들이 열기에 신음하고 있습니다. <br><b>목표:</b> 결빙된 심장 탈취. <br><b>전리품:</b> 빙하의 드레스 (착용 시 민감도 감소)."
        },
        dungeon2: {
            title: "⛪ 금욕의 수도원",
            body: "보스: 대수도원장 베네딕토. 40년간 금욕한 성직자들이 당신의 '발소리'만으로도 자지러집니다. <br><b>목표:</b> 순결의 소금 획득. <br><b>전리품:</b> 타락한 수도복 (유혹 스킬 위력 대폭 증가)."
        },
        dungeon3: {
            title: "🌿 몽환의 덩굴 숲",
            body: "보스: 숲의 여왕 알라우네. 숲 전체가 거대한 자궁처럼 맥동합니다. 촉수들이 당신의 옷을 녹이려 달려듭니다. <br><b>목표:</b> 금단의 꿀 채취. <br><b>전리품:</b> 덩굴 비키니 (방어력은 낮으나 매력 수치 극대화)."
        },
        dungeon4: {
            title: "🔥 타락한 마왕성",
            body: "보스: 마왕 제라드. 마왕의 권태를 끝낼 유일한 제물로 당신을 기다립니다. <br><b>목표:</b> 심연의 불꽃 획득. <br><b>전리품:</b> 마왕비의 관 (마왕의 구속에서 자유로워짐)."
        },
        home: {
            title: "🏠 연금술사의 공방 (거점)",
            body: "당신의 안식처이자 해독제 연구소. 밤마다 발렌틴이나 제라드가 침입할 수 있으니 주의하십시오. 연구 진행률을 높일 수 있는 유일한 장소입니다."
        },
        spa: {
            title: "⛲ 타락한 성녀의 온천",
            body: "미끈거리는 점액질 온천수가 흐르는 곳. 흥분도를 낮출 수 있지만, 무방비한 상태에서 누군가와 조우할 확률이 매우 높습니다."
        },
        buffet: {
            title: "🍷 심야의 타락 뷔페 '라스트 러브'",
            body: "모든 음식이 최음 효과를 가집니다. 일시적인 스태미나 상승 버프를 주지만, 랜덤하게 '의상 소멸' 등의 부작용이 뒤따릅니다."
        }
    };

    function showDesc(id) {
        document.getElementById('desc-title').innerHTML = data[id].title;
        document.getElementById('desc-body').innerHTML = data[id].body;
    }
</script>

</body>
</html>
